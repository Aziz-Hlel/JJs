services:
  api:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: docker/stage/Dockerfile.stage.api

    environment:
      NODE_ENV: ${NODE_ENV}
      API_PORT: ${API_PORT}
      ALLOWED_ORIGIN_PATTERNS: ${ALLOWED_ORIGIN_PATTERNS}
      FIREBASE_CERT: ${FIREBASE_CERT}

      IOS_MIN_SUPPORTED_VER: ${IOS_MIN_SUPPORTED_VER}
      ANDROID_MIN_SUPPORTED_VER: ${ANDROID_MIN_SUPPORTED_VER}

      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}

      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      MINIO_Region: ${MINIO_Region}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_PORT: ${MINIO_PORT}

      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}

    ports:
      - '${API_PORT:?API_PORT is required}:${API_PORT}'

    command: sh -c "node /app/apps/api/src/index.js"

    depends_on:
      - db
      - redis
      - minio
      - mailpit

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: '${DB_USER:?DB_USER is required}'
      POSTGRES_PASSWORD: '${DB_PASSWORD:?DB_PASSWORD is required}'
      POSTGRES_DB: '${DB_NAME:?DB_NAME is required}'
    ports:
      - '${DB_PORT:?DB_PORT is required}:5432'
    volumes:
      - jj_db_stage_volume:/var/lib/postgresql/data

  redis:
    image: redis:latest

    ports:
      - '${REDIS_PORT:?REDIS_PORT is required}:6379'
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-password}
    volumes:
      - jj_redis_stage_volume:/data

    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD:-password}', '--appendonly', 'yes'] # enables persistence

  minio:
    image: quay.io/minio/minio:latest

    ports:
      - '${MINIO_PORT:?MINIO_PORT is required}:9000'
      - '${MINIO_UI_PORT:?MINIO_UI_PORT is required}:9001' # Web UI

    env_file:
      - ${PROJECT_ROOT}/config/.env.dev
      - ${PROJECT_ROOT}/.env.local
      - ${PROJECT_ROOT}/.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

    volumes:
      - jj_minio_stage_volume:/data

    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_started

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_BUCKET: ${MINIO_BUCKET}

    volumes:
      - ${PROJECT_ROOT}/scripts/init_minio.sh:/init_minio.sh:ro
      - ${PROJECT_ROOT}/seed/minio:/seed:ro

    entrypoint: ['/bin/sh', '/init_minio.sh']

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - '${SMTP_UI_PORT:?SMTP_UI_PORT is required}:8025' # Web UI
      - '${SMTP_PORT:?SMTP_PORT is required}:1025'

volumes:
  jj_db_stage_volume:
  jj_redis_stage_volume:
  jj_minio_stage_volume:
